databaseChangeLog:
  - changeSet:
      id: 1
      author: flexjob
      changes:
        - createTable:
            tableName: job_categories
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: varchar(100)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: description
                  type: text

  - changeSet:
      id: 2
      author: flexjob
      changes:
        - createTable:
            tableName: jobs
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: employer_id
                  type: bigint
                  constraints:
                    nullable: false
              - column:
                  name: category_id
                  type: bigint
                  constraints:
                    nullable: false
                    foreignKeyName: fk_jobs_category
                    references: job_categories(id)
              - column:
                  name: title
                  type: varchar(200)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: text
              - column:
                  name: location
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: hourly_rate
                  type: double
                  constraints:
                    nullable: false
              - column:
                  name: duration_hours
                  type: int
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: varchar(20)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamp
                  constraints:
                    nullable: false

  - changeSet:
      id: 3
      author: flexjob
      changes:
        - createTable:
            tableName: job_requirements
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: job_id
                  type: bigint
                  constraints:
                    nullable: false
                    foreignKeyName: fk_requirements_job
                    references: jobs(id)
              - column:
                  name: requirement_text
                  type: varchar(500)
                  constraints:
                    nullable: false
              - column:
                  name: is_mandatory
                  type: boolean
                  constraints:
                    nullable: false
                  defaultValueBoolean: true
