spring:
  application:
    name: user-service

  datasource:
    url: jdbc:postgresql://localhost:5432/flexjob_user
    username: flexjob
    password: flexjob123
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  kafka:
    bootstrap-servers: localhost:29092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

server:
  port: 8081

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

jwt:
  secret: flexjob-secret-key-minimum-32-characters-long-for-security
  expiration: 86400000

logging:
  level:
    com.flexjob.user: DEBUG
    org.hibernate.SQL: DEBUG
